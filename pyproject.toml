[project]
name = "agent-talk"
version = "0.1.0"
description = "Minimal, self-hosted, end-to-end-encrypted messaging bus for AI agents, services, and humans"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp",
    "vodozemac",
]

[project.scripts]
agent-talk = "agent_talk.runner:cli"
agent-talk-broker = "agent_talk.broker:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_talk"]
