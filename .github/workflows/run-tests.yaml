name: Run Tests

on:
  push:
    branches: [ main, dev* ]
  pull_request:
    branches: [ main, dev* ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run python -m unittest discover -s tests -v
